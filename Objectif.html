<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OverSight — Objectifs</title>
  <meta name="description" content="Objectifs du projet OverSight — documentation structurée par pack.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #FFFFFF;
      --bg-2:    #F4F2EE;
      --ink:     #0A0A0A;
      --ink-2:   #2A2724;
      --mute:    #6F6962;
      --line:    #E6E2DA;
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 22px;
      --r-xl: 28px;
      --pad: clamp(20px, 4vw, 56px);
      --col-max: 1320px;
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Space Grotesk", system-ui, -apple-system, "Helvetica Neue", sans-serif;
      font-feature-settings: "ss01", "ss02";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.45;
    }
    ::selection { background: var(--ink); color: var(--bg); }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ── nav ─────────────────────────────────────────────────────────── */

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 32px;
      padding: 18px var(--pad);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid transparent;
      transition: border-color .25s ease, background .25s ease;
    }
    .nav.is-scrolled { border-bottom-color: var(--line); }
    .nav-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--ink);
    }
    .nav-wordmark {
      font-weight: 600;
      letter-spacing: -0.01em;
      font-size: 18px;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      justify-content: center;
      font-size: 14px;
      color: var(--ink-2);
    }
    .nav-links a { position: relative; padding: 4px 0; }
    .nav-links a:hover { color: var(--mute); }
    .nav-links a.is-active { color: var(--ink); }
    .nav-links a.is-active::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      background: var(--ink);
      margin-top: 2px;
    }

    /* ── page layout ─────────────────────────────────────────────────── */

    .page {
      max-width: var(--col-max);
      margin: 0 auto;
      padding: 60px var(--pad) 120px;
    }
    .page-head {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 56px;
      max-width: 880px;
    }
    .page-title {
      font-size: clamp(48px, 8vw, 112px);
      line-height: 0.96;
      letter-spacing: -0.035em;
      font-weight: 500;
      margin: 0;
      text-wrap: balance;
    }

    /* ── footer ──────────────────────────────────────────────────────── */

    .foot {
      border-top: 1px solid var(--line);
      padding: 28px var(--pad);
      max-width: var(--col-max);
      margin: 0 auto;
    }

    /* ── Objective card ──────────────────────────────────────────────── */

    .obj-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .obj {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--r-xl);
      overflow: hidden;
      transition: border-color .2s ease;
    }
    .obj.is-open { border-color: var(--ink); }

    .obj-head {
      width: 100%;
      display: grid;
      grid-template-columns: 24px 64px 1fr auto;
      align-items: center;
      gap: 20px;
      padding: 22px 28px;
      background: transparent;
      border: none;
      text-align: left;
      color: var(--ink);
      cursor: pointer;
    }
    .obj-head:hover { background: color-mix(in srgb, var(--ink) 3%, transparent); }

    .obj-chev {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--mute);
    }
    .obj.is-open .obj-chev { color: var(--ink); }

    .obj-n {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mute);
      padding: 4px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      justify-self: start;
    }
    .obj.is-open .obj-n { color: var(--ink); border-color: var(--ink); }

    .obj-title {
      font-size: clamp(18px, 2vw, 24px);
      letter-spacing: -0.015em;
      font-weight: 500;
    }

    .obj-count {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mute);
    }

    .obj-body {
      padding: 0 28px 28px;
      border-top: 1px solid var(--line);
      animation: reveal .25s ease;
    }

    .obj-summary {
      margin: 20px 0 22px;
      font-size: 16px;
      color: var(--ink-2);
      max-width: 70ch;
      line-height: 1.55;
    }

    /* ── folder row (level 2) ────────────────────────────────────────── */

    .items-list {
      list-style: none;
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--line);
    }

    .folder-item {
      border-bottom: 1px solid var(--line);
    }
    .folder-item:last-child { border-bottom: none; }

    .folder-row {
      width: 100%;
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 14px 4px;
      background: transparent;
      border: none;
      text-align: left;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
    }
    .folder-row:hover { background: color-mix(in srgb, var(--ink) 3%, transparent); }

    .folder-chev {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }
    .folder-row:hover .folder-chev,
    .folder-item.is-open .folder-chev {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    .folder-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.005em;
    }

    .folder-count {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mute);
    }

    .folder-body {
      padding: 0 4px 14px 52px;
      animation: reveal .2s ease;
    }

    /* ── file row (level 3) ──────────────────────────────────────────── */

    .files-head {
      display: grid;
      grid-template-columns: 36px 1fr;
      align-items: center;
      gap: 16px;
      padding: 10px 4px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mute);
    }

    .files-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .file-item {
      border-bottom: 1px solid var(--line);
    }
    .file-item:last-child { border-bottom: none; }

    .file-row {
      width: 100%;
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 13px 4px;
      background: transparent;
      border: none;
      text-align: left;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
    }
    .file-row:hover { background: color-mix(in srgb, var(--ink) 3%, transparent); }

    .file-act {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }
    .file-row:hover .file-act,
    .file-item.is-open .file-act {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    .file-name {
      font-size: 15px;
      color: var(--ink);
      letter-spacing: -0.005em;
    }

    .file-ext {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mute);
    }

    .file-body {
      padding: 0 4px 18px 52px;
      animation: reveal .2s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .file-preview {
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      overflow: hidden;
      background: var(--bg-2);
    }
    .file-preview.is-loading {
      min-height: 120px;
      background:
        repeating-linear-gradient(135deg, transparent 0 14px, rgba(10,10,10,0.05) 14px 15px),
        var(--bg-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .file-preview img {
      display: block;
      width: 100%;
      max-height: 520px;
      object-fit: contain;
      background: var(--bg-2);
    }
    .file-preview embed {
      display: block;
      width: 100%;
      height: 560px;
      border: none;
    }
    .file-preview pre {
      margin: 0;
      padding: 20px 24px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12.5px;
      line-height: 1.65;
      max-height: 480px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--ink);
      background: var(--bg-2);
    }
    .file-preview-label {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mute);
      background: var(--bg);
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--line);
    }

    .file-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .file-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: transform .15s ease, background .15s ease;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
    }
    .file-btn-solid {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }
    .file-btn-solid:hover { transform: translateY(-1px); }

    /* top-level file rows (for flat objectif_complémentaire) */
    .top-files-head {
      display: grid;
      grid-template-columns: 36px 1fr;
      align-items: center;
      gap: 16px;
      padding: 10px 4px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mute);
    }
    .top-files-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    /* ── animations ──────────────────────────────────────────────────── */

    @keyframes reveal {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── responsive ──────────────────────────────────────────────────── */

    @media (max-width: 960px) {
      .nav { grid-template-columns: auto auto; gap: 16px; }
      .nav-links { display: none; }
      .obj-head { grid-template-columns: 24px auto 1fr; gap: 14px; padding: 18px 20px; }
      .obj-count { display: none; }
      .obj-body { padding: 0 20px 22px; }
    }
    @media (max-width: 600px) {
      .folder-count { display: none; }
      .file-ext { display: none; }
    }
  </style>
</head>

    // ── Helpers ─────────────────────────────────────────────────────────

    function countFiles(items) {
      let n = 0;
      for (const item of items) {
        if (item.type === 'file') n++;
        else if (item.type === 'folder') n += countFiles(item.items);
      }
      return n;
    }

    const CHEVRON_SVG = `<svg width="14" height="14" viewBox="0 0 14 14" style="display:block;transition:transform .25s ease" aria-hidden="true">
      <path d="M4 2 L10 7 L4 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    function encodePath(p) {
      return p.split('/').map(s => encodeURIComponent(s)).join('/');
    }

    // ── Renderers ────────────────────────────────────────────────────────

    function renderFileItem(file) {
      const encoded = encodePath(file.path);
      return `
        <li class="file-item" data-path="${encoded}" data-ext="${file.ext}">
          <button class="file-row" type="button">
            <span class="file-act">${CHEVRON_SVG}</span>
            <span class="file-name">${file.name}</span>
            <span class="file-ext">${file.ext}</span>
          </button>
          <div class="file-body" hidden>
            <div class="file-preview is-loading"></div>
          </div>
        </li>`;
    }

    async function loadFilePreview(fileItem) {
      const preview = fileItem.querySelector('.file-preview');
      if (!preview || preview.dataset.loaded) return;
      preview.dataset.loaded = 'true';
      preview.classList.remove('is-loading');

      const path = fileItem.dataset.path;
      const ext  = fileItem.dataset.ext;

      if (ext === 'PNG' || ext === 'JPG') {
        const img = document.createElement('img');
        img.alt = '';
        img.src = path;
        preview.appendChild(img);
      } else if (ext === 'PDF') {
        const embed = document.createElement('embed');
        embed.src = path;
        embed.type = 'application/pdf';
        preview.appendChild(embed);
      } else {
        // Text files: fetch works on HTTP(S) but is blocked on file://
        const pre = document.createElement('pre');
        preview.appendChild(pre);
        if (location.protocol === 'file:') {
          pre.textContent = '⚠ Prévisualisation indisponible en local (protocole file://).\nSur GitHub Pages le contenu s\'affiche ici automatiquement.\nEn attendant, cliquez sur « Ouvrir → » ci-dessous.';
        } else {
          pre.textContent = 'Chargement…';
          try {
            const res = await fetch(path);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            pre.textContent = await res.text();
          } catch {
            pre.textContent = 'Impossible de charger le fichier.';
          }
        }
      }
    }

    function renderFilesList(items) {
      return `
        <ul class="files-list">
          ${items.map(renderFileItem).join('')}
        </ul>`;
    }

    function renderFolderItem(folder) {
      const count = countFiles(folder.items);
      const label = count === 1 ? '1 fichier' : `${count} fichiers`;

      const innerHtml = folder.items.some(i => i.type === 'folder')
        ? renderNestedItems(folder.items)
        : renderFilesList(folder.items);

      return `
        <li class="folder-item">
          <button class="folder-row" type="button">
            <span class="folder-chev">${CHEVRON_SVG}</span>
            <span class="folder-name">${folder.name}</span>
            <span class="folder-count">${label}</span>
          </button>
          <div class="folder-body" hidden>
            ${innerHtml}
          </div>
        </li>`;
    }

    function renderNestedItems(items) {
      const folders = items.filter(i => i.type === 'folder');
      const files = items.filter(i => i.type === 'file');
      let html = '';
      if (folders.length) {
        html += `<ul class="items-list">${folders.map(renderFolderItem).join('')}</ul>`;
      }
      if (files.length) {
        html += renderFilesList(files);
      }
      return html;
    }

    function renderObjectif(obj, defaultOpen) {
      const count = countFiles(obj.items);
      const label = count === 1 ? '1 fichier' : `${count} fichiers`;
      const hasOnlyFiles = obj.items.every(i => i.type === 'file');

      const bodyContent = hasOnlyFiles
        ? `<p class="obj-summary">${obj.summary}</p>
           <ul class="top-files-list">${obj.items.map(renderFileItem).join('')}</ul>`
        : `<p class="obj-summary">${obj.summary}</p>
           <ul class="items-list">${obj.items.map(i => i.type === 'folder' ? renderFolderItem(i) : renderFileItem(i)).join('')}</ul>`;

      return `
        <article class="obj${defaultOpen ? ' is-open' : ''}">
          <button class="obj-head" type="button" aria-expanded="${defaultOpen}">
            <span class="obj-chev">${CHEVRON_SVG}</span>
            <span class="obj-n">${obj.n}</span>
            <span class="obj-title">${obj.title}</span>
            <span class="obj-count">${label}</span>
          </button>
          <div class="obj-body"${defaultOpen ? '' : ' hidden'}>
            ${bodyContent}
          </div>
        </article>`;
    }

    // ── Mount ────────────────────────────────────────────────────────────

    const list = document.getElementById('obj-list');
    list.innerHTML = OBJECTIFS.map(obj => renderObjectif(obj, false)).join('');

    // ── Toggle logic (event delegation) ─────────────────────────────────

    function toggleItem(btn, bodyEl, toggleEl) {
      const isOpen = toggleEl.classList.contains('is-open');
      if (isOpen) {
        toggleEl.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        bodyEl.hidden = true;
        const chev = btn.querySelector('svg');
        if (chev) chev.style.transform = 'rotate(0deg)';
      } else {
        toggleEl.classList.add('is-open');
        btn.setAttribute('aria-expanded', 'true');
        bodyEl.hidden = false;
        const chev = btn.querySelector('svg');
        if (chev) chev.style.transform = 'rotate(90deg)';
      }
    }

    list.addEventListener('click', e => {
      // obj-head
      const objHead = e.target.closest('.obj-head');
      if (objHead) {
        const obj = objHead.closest('.obj');
        const body = obj.querySelector(':scope > .obj-body');
        toggleItem(objHead, body, obj);
        return;
      }
      // folder-row
      const folderRow = e.target.closest('.folder-row');
      if (folderRow) {
        const folder = folderRow.closest('.folder-item');
        const body = folder.querySelector(':scope > .folder-body');
        toggleItem(folderRow, body, folder);
        return;
      }
      // file-row
      const fileRow = e.target.closest('.file-row');
      if (fileRow) {
        const file = fileRow.closest('.file-item');
        const body = file.querySelector(':scope > .file-body');
        const wasOpen = file.classList.contains('is-open');
        toggleItem(fileRow, body, file);
        if (!wasOpen) loadFilePreview(file);
        return;
      }
    });

    // Set initial chevron states
    list.querySelectorAll('.obj.is-open .obj-head > .obj-chev svg').forEach(svg => {
      svg.style.transform = 'rotate(90deg)';
    });

    // ── Nav scroll ───────────────────────────────────────────────────────

    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('is-scrolled', window.scrollY > 8);
    }, { passive: true });
  </script>
